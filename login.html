<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>PlaidInvest | Login</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/home.css">
  <script src="/js/env.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/guard-tamper.js"></script>
  <script src="/js/auth.js"></script>
</head>
<body class="page-login min-h-full bg-gray-950 text-gray-100 antialiased" style="background:#0b0f14;color:#f3f4f6">

  <header class="site-nav">
    <div class="site-nav-inner">
      <a href="/index.html" class="text-logo"><span class="text-logo-mark">₿</span><span data-logo-text>PlaidInvest</span></a>
      <a href="/index.html" class="nav-link">← Home</a>
    </div>
  </header>

  <main>
    <div class="login-wrap">
      <div class="text-center mb-8">
        <img data-coin="btc" src="/assets/icons/btc.svg" alt="Bitcoin" class="coin-icon-xl mx-auto mb-4" width="56" height="56">
        <h1 class="text-2xl font-bold text-white">Sign in to <span data-logo-text>PlaidInvest</span></h1>
      </div>
      <form id="login-form" class="app-card p-6 sm:p-8 space-y-5" novalidate>
        <div>
          <label for="email" class="form-label">Email</label>
          <input id="email" type="email" required class="form-input" placeholder="you@email.com">
        </div>
        <div>
          <label for="password" class="form-label">Password</label>
          <div class="password-field">
            <input id="password" type="password" required minlength="6" class="form-input" placeholder="••••••••" autocomplete="current-password">
            <button type="button" id="password-toggle" class="password-toggle" aria-label="Show password" aria-pressed="false">
              <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
        </div>
        <p id="login-error" class="text-red-400 text-sm hidden"></p>
        <button type="submit" class="btn-primary w-full py-3">Sign In</button>
      </form>
      <p class="text-center text-sm text-gray-500 mt-6"><a href="/index.html#plans" class="text-primary">View investment plans</a></p>
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script src="/js/login-page.js"></script>
</body>
</html>
