<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <script src="/js/guard-tamper.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    (function () {
      var target = "/dashboard.html";
      if (!window.SatVaultAuth || !SatVaultAuth.isLoggedIn()) {
        location.replace("/login.html?next=" + encodeURIComponent(target));
        return;
      }
      location.replace(target);
    })();
  </script>
</head>
<body>
  <p><a href="/dashboard.html">Go to dashboard</a></p>
</body>
</html>
